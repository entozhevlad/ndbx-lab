services:
  service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      redis:
        condition: service_started
      mongodb-init:
        condition: service_completed_successfully
      cassandra-init:
        condition: service_completed_successfully
      neo4j-init:
        condition: service_completed_successfully
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    env_file:
      - .env.local
    hostname: ${REDIS_HOST}
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server --bind "$${REDIS_HOST}" --port "$${REDIS_PORT}" --requirepass "$${REDIS_PASSWORD}"
        else
          exec redis-server --bind "$${REDIS_HOST}" --port "$${REDIS_PORT}"
        fi
    restart: unless-stopped

  config1:
    image: mongo:8.2
    env_file:
      - .env.local
    hostname: config1
    ports:
      - "${CONFIG1_PORT}:${CONFIG1_PORT}"
    volumes:
      - config1-data:/data/db
    command:
      - sh
      - -c
      - |
        exec mongod --bind_ip_all --configsvr --replSet "$${CONFIGRS_NAME}" --port "$${CONFIG1_PORT}" --dbpath /data/db
    restart: unless-stopped

  config2:
    image: mongo:8.2
    env_file:
      - .env.local
    hostname: config2
    ports:
      - "${CONFIG2_PORT}:${CONFIG2_PORT}"
    volumes:
      - config2-data:/data/db
    command:
      - sh
      - -c
      - |
        exec mongod --bind_ip_all --configsvr --replSet "$${CONFIGRS_NAME}" --port "$${CONFIG2_PORT}" --dbpath /data/db
    restart: unless-stopped

  config3:
    image: mongo:8.2
    env_file:
      - .env.local
    hostname: config3
    ports:
      - "${CONFIG3_PORT}:${CONFIG3_PORT}"
    volumes:
      - config3-data:/data/db
    command:
      - sh
      - -c
      - |
        exec mongod --bind_ip_all --configsvr --replSet "$${CONFIGRS_NAME}" --port "$${CONFIG3_PORT}" --dbpath /data/db
    restart: unless-stopped

  shard1a:
    image: mongo:8.2
    env_file:
      - .env.local
    hostname: shard1a
    ports:
      - "${SHARD1_A_PORT}:${SHARD1_A_PORT}"
    volumes:
      - shard1a-data:/data/db
    command:
      - sh
      - -c
      - |
        exec mongod --bind_ip_all --shardsvr --replSet "$${SHARD1_RS_NAME}" --port "$${SHARD1_A_PORT}" --dbpath /data/db
    restart: unless-stopped

  shard1b:
    image: mongo:8.2
    env_file:
      - .env.local
    hostname: shard1b
    ports:
      - "${SHARD1_B_PORT}:${SHARD1_B_PORT}"
    volumes:
      - shard1b-data:/data/db
    command:
      - sh
      - -c
      - |
        exec mongod --bind_ip_all --shardsvr --replSet "$${SHARD1_RS_NAME}" --port "$${SHARD1_B_PORT}" --dbpath /data/db
    restart: unless-stopped

  shard1c:
    image: mongo:8.2
    env_file:
      - .env.local
    hostname: shard1c
    ports:
      - "${SHARD1_C_PORT}:${SHARD1_C_PORT}"
    volumes:
      - shard1c-data:/data/db
    command:
      - sh
      - -c
      - |
        exec mongod --bind_ip_all --shardsvr --replSet "$${SHARD1_RS_NAME}" --port "$${SHARD1_C_PORT}" --dbpath /data/db
    restart: unless-stopped

  shard2a:
    image: mongo:8.2
    env_file:
      - .env.local
    hostname: shard2a
    ports:
      - "${SHARD2_A_PORT}:${SHARD2_A_PORT}"
    volumes:
      - shard2a-data:/data/db
    command:
      - sh
      - -c
      - |
        exec mongod --bind_ip_all --shardsvr --replSet "$${SHARD2_RS_NAME}" --port "$${SHARD2_A_PORT}" --dbpath /data/db
    restart: unless-stopped

  shard2b:
    image: mongo:8.2
    env_file:
      - .env.local
    hostname: shard2b
    ports:
      - "${SHARD2_B_PORT}:${SHARD2_B_PORT}"
    volumes:
      - shard2b-data:/data/db
    command:
      - sh
      - -c
      - |
        exec mongod --bind_ip_all --shardsvr --replSet "$${SHARD2_RS_NAME}" --port "$${SHARD2_B_PORT}" --dbpath /data/db
    restart: unless-stopped

  shard2c:
    image: mongo:8.2
    env_file:
      - .env.local
    hostname: shard2c
    ports:
      - "${SHARD2_C_PORT}:${SHARD2_C_PORT}"
    volumes:
      - shard2c-data:/data/db
    command:
      - sh
      - -c
      - |
        exec mongod --bind_ip_all --shardsvr --replSet "$${SHARD2_RS_NAME}" --port "$${SHARD2_C_PORT}" --dbpath /data/db
    restart: unless-stopped

  mongos:
    image: mongo:8.2
    env_file:
      - .env.local
    hostname: ${MONGODB_HOST}
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"
    depends_on:
      config1:
        condition: service_started
      config2:
        condition: service_started
      config3:
        condition: service_started
    command:
      - sh
      - -c
      - |
        exec mongos --bind_ip_all --port "$${MONGODB_PORT}" --configdb "$${CONFIGRS_NAME}/config1:$${CONFIG1_PORT},config2:$${CONFIG2_PORT},config3:$${CONFIG3_PORT}"
    restart: unless-stopped

  mongodb-init:
    image: mongo:8.2
    env_file:
      - .env.local
    depends_on:
      config1:
        condition: service_started
      config2:
        condition: service_started
      config3:
        condition: service_started
      shard1a:
        condition: service_started
      shard1b:
        condition: service_started
      shard1c:
        condition: service_started
      shard2a:
        condition: service_started
      shard2b:
        condition: service_started
      shard2c:
        condition: service_started
      mongos:
        condition: service_started
    volumes:
      - ./scripts/mongodb:/scripts/mongodb:ro
    command:
      - sh
      - /scripts/mongodb/init-cluster.sh
    restart: "no"

  cassandra-test:
    image: cassandra:4.1
    env_file:
      - .env.local
    hostname: ${CASSANDRA_HOSTS}
    ports:
      - "${CASSANDRA_PORT}:${CASSANDRA_PORT}"
    environment:
      CASSANDRA_NATIVE_TRANSPORT_PORT: ${CASSANDRA_PORT}
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test:
        - CMD-SHELL
        - "cqlsh -e 'describe keyspaces' ${CASSANDRA_HOSTS} ${CASSANDRA_PORT} || exit 1"
      start_period: ${CASSANDRA_HEALTHCHECK_START_PERIOD}
    restart: unless-stopped

  cassandra-init:
    image: cassandra:4.1
    env_file:
      - .env.local
    depends_on:
      cassandra-test:
        condition: service_healthy
    volumes:
      - ./scripts/cassandra:/scripts/cassandra:ro
    command:
      - sh
      - /scripts/cassandra/init-cluster.sh
    restart: "no"

  neo4j:
    image: neo4j:5.24
    hostname: ${NEO4J_HOST}
    ports:
      - "${NEO4J_BOLT_PORT}:7687"
      - "${NEO4J_HTTP_PORT}:7474"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    volumes:
      - neo4j-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - "cypher-shell -u ${NEO4J_USERNAME} -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"
      start_period: ${NEO4J_HEALTHCHECK_START_PERIOD}
    restart: unless-stopped

  neo4j-init:
    image: neo4j:5.24
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URL: ${NEO4J_URL}
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    volumes:
      - ./scripts/neo4j:/scripts/neo4j:ro
    entrypoint:
      - /bin/sh
    command:
      - /scripts/neo4j/init-graph.sh
    restart: "no"

volumes:
  config1-data:
    name: ${CONFIG1_VOLUME}
  config2-data:
    name: ${CONFIG2_VOLUME}
  config3-data:
    name: ${CONFIG3_VOLUME}
  shard1a-data:
    name: ${SHARD1_A_VOLUME}
  shard1b-data:
    name: ${SHARD1_B_VOLUME}
  shard1c-data:
    name: ${SHARD1_C_VOLUME}
  shard2a-data:
    name: ${SHARD2_A_VOLUME}
  shard2b-data:
    name: ${SHARD2_B_VOLUME}
  shard2c-data:
    name: ${SHARD2_C_VOLUME}
  cassandra-data:
    name: ${CASSANDRA_VOLUME}
  neo4j-data:
    name: ${NEO4J_VOLUME}
