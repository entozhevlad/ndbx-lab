repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: uv run isort --check-only
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
